services:
  redis:
    image: redis
    container_name: sebas_redis
    ports:
      - "6379:6379"
    volumes:
      - ../../data/redis:/data

  mysqldb:
    image: mysql:8.0.36
    container_name: sebas_mysqldb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQLDB_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQLDB_USER}
      MYSQL_PASSWORD: ${MYSQLDB_PASSWORD}
    ports:
      - "4306:3306"
    volumes:
      - ../../data/mysql:/var/lib/mysql
